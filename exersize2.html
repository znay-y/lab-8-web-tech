<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css\reset.css">
    <link rel="stylesheet" href="css\ex2.css">

    <title>Birthday Calculator</title>
</head>

<body>
    <form method="post" action="exersize2.php" id="mainform">
        <fieldset>
            <legend>My Birthday</legend>
            <div>
                <section>

                    <label>Name</label>
                    <input type="text" name="username" id="namein" required>
                </section>
                <section>
                    <label>Date of Birth</label>
                    <input type="date" name="birthday" id="datein">
                </section>

                <footer>
                    <input type="submit" class="button">
                    <input type="reset" value="Clear Form" class="button">
                </footer>
            </div>

            <script src="js/ex2.js"></script>
        </fieldset>
    </form>
</body>

</html>
